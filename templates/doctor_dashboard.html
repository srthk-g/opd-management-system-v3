<!DOCTYPE html>
<html>
<head>
<title>Doctor Dashboard</title>
<style>
body{ font-family:Arial; margin:0; background:#f4f6f9; }
header{ background:#0d6efd; color:white; padding:20px; text-align:center; }
.container{ display:flex; justify-content:center; gap:30px; flex-wrap:wrap; margin-top:60px; }
.card{ background:white; width:220px; padding:25px; text-align:center; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
.card h3{ margin-bottom:15px; }
.btn{
  display:inline-block; padding:10px 20px; background:#0d6efd;
  color:white; text-decoration:none; border-radius:5px; font-weight:bold;
}
.btn:hover{ background:#0a58ca; }
.btn-form{ width:100%; padding:10px 20px; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer; font-size:14px; }
.btn-available{ background:#20c997; }
.btn-available:hover{ background:#17a589; }
.btn-unavailable{ background:#6c757d; }
.btn-unavailable:hover{ background:#565e64; }
.status-badge{
  display:inline-block; padding:5px 14px; border-radius:20px;
  font-size:13px; font-weight:bold; margin-bottom:14px;
}
.badge-green{ background:#d4edda; color:#155724; }
.badge-gray{ background:#e2e3e5; color:#383d41; }
.logout{ text-align:center; margin-top:50px; }
.logout a{ color:red; font-weight:bold; text-decoration:none; }
</style>
</head>
<body>
<header>
<h1>Doctor Dashboard</h1>
<p>Hospital Management System</p>
</header>
<div class="container">
  <div class="card">
    <h3>View Appointments</h3>
    <a class="btn" href="/doctor/appointments">Open</a>
  </div>
  <div class="card">
    <h3>Add Patient Visit</h3>
    <a class="btn" href="/doctor/add-visit">Open</a>
  </div>
  <div class="card">
    <h3>Patient Records</h3>
    <a class="btn" href="/doctor/patient-records">Open</a>
  </div>
  <div class="card">
    <h3>My Availability</h3>
    {% if available %}
      <div class="status-badge badge-green">&#10003; Available</div>
    {% else %}
      <div class="status-badge badge-gray">&#10005; Not Available</div>
    {% endif %}
    <form method="POST" action="/doctor/toggle-availability">
      <button type="submit" class="btn-form {% if available %}btn-unavailable{% else %}btn-available{% endif %}">
        {% if available %}Mark as Unavailable{% else %}Mark as Available{% endif %}
      </button>
    </form>
  </div>
</div>
<div class="logout">
<a href="/logout">Logout</a>
</div>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Doctor Login</title>
<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#2e7bd6,#5fa8ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}
.login-box{
    background:white;
    padding:40px;
    border-radius:10px;
    width:320px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    text-align:center;
}
.login-box h2{ margin-bottom:25px; color:#1f5fbf; }
label{ display:block; text-align:left; margin-bottom:5px; font-weight:bold; }
input{
    width:100%; padding:10px; margin-bottom:15px;
    border-radius:5px; border:1px solid #ccc; box-sizing:border-box;
}
button{
    width:100%; padding:10px; background:#1f5fbf;
    color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer;
}
button:hover{ background:#174a96; }
a{ text-decoration:none; color:#1f5fbf; }
.back{ display:block; margin-top:15px; }
.error{ color:red; font-size:13px; margin-bottom:10px; text-align:left; }
</style>
</head>
<body>
<div class="login-box">
<h2>Doctor Login</h2>
<form method="POST" action="/login/doctor">
{% if error %}
<div class="error">{{ error }}</div>
{% endif %}
<label>Doctor ID</label>
<input type="text" name="doctor_id" placeholder="Enter your Doctor ID" required>
<label>Password</label>
<input type="password" name="password" placeholder="Enter your Password" required>
<button type="submit">Login</button>
</form>
<p>New doctor? <a href="/register/doctor">Register here</a></p>
<a class="back" href="/">&#8592; Back to Home</a>
</div>
</body>
</html>

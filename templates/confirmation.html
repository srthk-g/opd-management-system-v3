<!DOCTYPE html>
<html>
<head>
<title>Appointment Confirmed</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#2e7bd6,#5fa8ff);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.confirm-box{
    background:white;
    padding:40px;
    border-radius:10px;
    text-align:center;
    width:350px;
    box-shadow:0 6px 20px rgba(0,0,0,0.2);
}

h2{
    color:#1f5fbf;
}

button{
    margin-top:20px;
    padding:10px 20px;
    background:#1f5fbf;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#174a96;
}

</style>

</head>

<body>

<div class="confirm-box">

<h2>Your appointment is confirmed ✅</h2>

<p>Thank you for booking with Silver Lotus Hospital.</p>

<a href="/">
<button>Go Back</button>
</a>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F4F8FC;
    color:#333;
}

header{
    background: linear-gradient(135deg,#0B5ED7,#0A3D91);
    color:white;
    text-align:center;
    padding:40px 20px;
}

header h1{
    font-size:32px;
    font-weight:600;
}

header p{
    margin-top:8px;
    opacity:0.9;
}

.container{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    margin-top:60px;
    padding:20px;
}

.card{
    background:#FFFFFF;
    padding:30px 25px;
    width:260px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.08);
    border-top:4px solid #0B5ED7;
    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-6px);
}

.icon{
    font-size:40px;
    margin-bottom:10px;
}

.card h3{
    margin-bottom:10px;
    color:#0B5ED7;
}

.card p{
    font-size:14px;
    color:#6C757D;
    margin-bottom:18px;
}

.btn{
    display:inline-block;
    padding:10px 22px;
    border-radius:25px;
    background:#20C997;
    color:white;
    text-decoration:none;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    background:#17A589;
}

footer{
    text-align:center;
    margin-top:80px;
    padding-bottom:20px;
    color:#6C757D;
}

</style>
</head>

<body>

<header>
<h1>🏥 SILVER LOTUS HOSPITAL</h1>
<p>OPD, IPD and Inventory Management</p>
</header>

<div class="container">

<div class="card">
<div class="icon">🧑‍⚕️</div>
<h3>Patient Portal</h3>
<p>Appointments, registration and admission</p>
<a class="btn" href="/login/patient">Login</a>
</div>

<div class="card">
<div class="icon">👨‍⚕️</div>
<h3>Doctor Portal</h3>
<p>View appointments and record visits</p>
<a class="btn" href="/login/doctor">Login</a>
</div>

<div class="card">
<div class="icon">💊</div>
<h3>Inventory Manager</h3>
<p>Medicine and consumables inventory</p>
<a class="btn" href="/login/inventory">Login</a>
</div>

</div>

<footer>
<p>eHospital System</p>
</footer>

</body>
</html>

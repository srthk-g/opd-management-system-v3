<!DOCTYPE html>
<html>
<head>
<title>Add Patient Visit</title>
<style>
body{ font-family:Arial; margin:0; background:#f4f6f9; }
header{ background:#0d6efd; color:white; padding:20px; text-align:center; }
.container{ max-width:560px; margin:40px auto; padding:0 20px; }
.card{ background:white; padding:30px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
h2{ color:#0d6efd; margin-top:0; margin-bottom:20px; }
label{ display:block; margin:14px 0 5px; font-weight:bold; font-size:14px; }
input, select, textarea{
  width:100%; padding:10px; border-radius:5px;
  border:1px solid #ccc; box-sizing:border-box; font-size:14px; font-family:Arial;
}
textarea{ resize:vertical; min-height:90px; }
.btn{
  display:inline-block; margin-top:20px; width:100%; padding:12px;
  background:#0d6efd; color:white; border:none; border-radius:5px;
  font-size:16px; cursor:pointer; font-weight:bold;
}
.btn:hover{ background:#0a58ca; }
.back{ display:inline-block; margin-bottom:20px; color:#0d6efd; text-decoration:none; font-weight:bold; }
.back:hover{ text-decoration:underline; }
.success{ background:#d4edda; border:1px solid #c3e6cb; color:#155724; padding:12px 16px; border-radius:6px; margin-bottom:16px; }
.logout{ text-align:center; margin-top:40px; }
.logout a{ color:red; font-weight:bold; text-decoration:none; }
</style>
</head>
<body>
<header>
<h1>Doctor Dashboard</h1>
<p>Hospital Management System</p>
</header>
<div class="container">
<a class="back" href="/doctor/dashboard">&#8592; Back to Dashboard</a>
{% if saved %}
<div class="success">&#10003; Visit recorded successfully for <strong>{{ saved }}</strong>.</div>
{% endif %}
<div class="card">
<h2>Add Patient Visit</h2>
<form method="POST" action="/doctor/add-visit">
  <label>Select Patient</label>
  <select name="patient_id" required>
    <option value="" disabled selected>-- Select patient --</option>
    {% for p in patients %}
    <option value="{{ p['id'] }}">{{ p['name'] }} ({{ p['phone'] }})</option>
    {% endfor %}
  </select>
  <label>Visit Date</label>
  <input type="date" name="visit_date" required>
  <label>Diagnosis</label>
  <input type="text" name="diagnosis" placeholder="e.g. Viral fever" required>
  <label>Prescription / Notes</label>
  <textarea name="notes" placeholder="Medicines prescribed, instructions..."></textarea>
  <button type="submit" class="btn">Save Visit</button>
</form>
</div>
</div>
<div class="logout"><a href="/logout">Logout</a></div>
</body>
</html>
